name: Build and deploy slides

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so scripts/build-site.sh can date each talk via git log

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install gophern
        run: |
          go install github.com/gophernment/gophern@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Setup Chrome for PDF export
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Expose Chrome as "google-chrome" on PATH
        # setup-chrome only provides an output path (its installed binary
        # name isn't guaranteed to be "chrome"/"google-chrome") — chromedp
        # (used by `gophern export`) only searches PATH for a fixed list of
        # names, it doesn't read an output var, so symlink one in.
        run: sudo ln -s "${{ steps.setup-chrome.outputs.chrome-path }}" /usr/local/bin/google-chrome

      - name: Build slide decks (HTML + PDF)
        run: bash scripts/build-site.sh

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
