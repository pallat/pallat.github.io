<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 260" font-family="Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F8B229"/>
    </marker>
  </defs>

  <!-- arrows (graph RL: Trace -> Debug -> Info -> Warn -> Error -> Fatal) -->
  <line x1="1080" y1="130" x2="1045" y2="130" stroke="#F8B229" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="870" y1="130" x2="835" y2="130" stroke="#F8B229" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="660" y1="130" x2="625" y2="130" stroke="#F8B229" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="450" y1="130" x2="415" y2="130" stroke="#F8B229" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="240" y1="130" x2="205" y2="130" stroke="#F8B229" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- nodes, left to right: Fatal, Error, Warn, Info, Debug, Trace -->
  <g>
    <rect x="30" y="85" width="170" height="90" rx="14" fill="#D99BAD" stroke="#7C0000" stroke-width="3"/>
    <text x="115" y="138" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700">FATAL</text>
  </g>
  <g>
    <rect x="240" y="85" width="170" height="90" rx="14" fill="#CE3262" stroke="#7C0000" stroke-width="3"/>
    <text x="325" y="138" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700">ERROR</text>
  </g>
  <g>
    <rect x="450" y="85" width="170" height="90" rx="14" fill="#D99BAD" stroke="#7C0000" stroke-width="3"/>
    <text x="535" y="138" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700">WARN</text>
  </g>
  <g>
    <rect x="660" y="85" width="170" height="90" rx="14" fill="#D99BAD" stroke="#7C0000" stroke-width="3"/>
    <text x="745" y="138" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700">INFO</text>
  </g>
  <g>
    <rect x="870" y="85" width="170" height="90" rx="14" fill="#D99BAD" stroke="#7C0000" stroke-width="3"/>
    <text x="955" y="138" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700">DEBUG</text>
  </g>
  <g>
    <rect x="1080" y="85" width="170" height="90" rx="14" fill="#D99BAD" stroke="#7C0000" stroke-width="3"/>
    <text x="1165" y="138" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700">TRACE</text>
  </g>
</svg>
