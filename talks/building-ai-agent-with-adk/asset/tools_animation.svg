<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      /* General Styles */
      text { font-family: monospace; }
      .box { fill: #1e293b; stroke: #3b82f6; stroke-width: 2; rx: 8; }
      .box-tool { fill: #1e293b; stroke: #f472b6; stroke-width: 2; rx: 8; }
      .box-llm { fill: #1e293b; stroke: #a855f7; stroke-width: 2; rx: 8; }
      
      /* Data Packets */
      .packet { fill: #38bdf8; rx: 4; }
      
      /* Animations */
      @keyframes moveToolToContext {
        0%, 5% { transform: translate(0px, 0px) scale(1); opacity: 1; }
        20%, 95% { transform: translate(0px, -110px) scale(0.6); opacity: 1; }
        100% { transform: translate(0px, 0px) scale(1); opacity: 0; }
      }

      @keyframes dashFlow {
        to { stroke-dashoffset: -16; }
      }

      @keyframes packetToLlm {
        0%, 22% { transform: translate(0, 0); opacity: 0; }
        25% { transform: translate(0, 0); opacity: 1; }
        40% { transform: translate(320px, 0); opacity: 1; }
        45%, 100% { transform: translate(320px, 0); opacity: 0; }
      }

      @keyframes toolCall {
        0%, 42% { transform: translate(0, 0); opacity: 0; }
        45% { transform: translate(0, 0); opacity: 1; }
        60% { transform: translate(-320px, 120px); opacity: 1; } /* LLM to Tool */
        65%, 100% { transform: translate(-320px, 120px); opacity: 0; }
      }

      @keyframes toolResult {
        0%, 62% { transform: translate(0, 0); opacity: 0; }
        65% { transform: translate(0, 0); opacity: 1; }
        80% { transform: translate(320px, -120px); opacity: 1; } /* Tool to LLM */
        85%, 100% { transform: translate(320px, -120px); opacity: 0; }
      }
      
      @keyframes blinkNode {
        0%, 15% { filter: brightness(1); }
        20%, 30% { filter: brightness(1.5); }
        35%, 100% { filter: brightness(1); }
      }
      @keyframes blinkLlm {
        0%, 40% { filter: brightness(1); }
        45%, 55% { filter: brightness(1.5); }
        60%, 100% { filter: brightness(1); }
      }
      @keyframes blinkToolExec {
        0%, 60% { filter: brightness(1); }
        65%, 75% { filter: brightness(1.5); }
        80%, 100% { filter: brightness(1); }
      }

      /* Apply Animations */
      .anim-tool-node { animation: moveToolToContext 8s ease-in-out infinite; }
      .anim-packet-context { animation: packetToLlm 8s ease-in-out infinite; }
      .anim-packet-call { animation: toolCall 8s ease-in-out infinite; }
      .anim-packet-result { animation: toolResult 8s ease-in-out infinite; }
      
      .node-context { animation: blinkNode 8s infinite; }
      .node-llm { animation: blinkLlm 8s infinite; }
      .node-tool { animation: blinkToolExec 8s infinite; }
      
      /* Arrows */
      .arrow-line { stroke: #475569; stroke-width: 2; stroke-dasharray: 8 8; animation: dashFlow 1s linear infinite; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>

  <!-- Background for visibility in preview -->
  <rect width="100%" height="100%" fill="#0f172a" />

  <!-- Paths / Arrows -->
  <path class="arrow-line" d="M 220 120 L 520 120" marker-end="url(#arrowhead)" />
  <text x="370" y="105" fill="#94a3b8" font-size="12" text-anchor="middle">Context + Tools</text>

  <path class="arrow-line" d="M 520 160 L 220 230" marker-end="url(#arrowhead)" />
  <text x="370" y="175" fill="#94a3b8" font-size="12" text-anchor="middle">Tool Call (JSON)</text>

  <path class="arrow-line" d="M 220 250 L 520 180" marker-end="url(#arrowhead)" />
  <text x="370" y="245" fill="#94a3b8" font-size="12" text-anchor="middle">Tool Result</text>

  <!-- Nodes -->
  <!-- Context Box -->
  <g class="node-context" transform="translate(60, 80)">
    <rect class="box" width="160" height="80" />
    <text x="80" y="35" fill="#f8fafc" font-size="16" text-anchor="middle" font-weight="bold">Context</text>
    <text x="80" y="55" fill="#94a3b8" font-size="12" text-anchor="middle">System Prompt</text>
  </g>

  <!-- LLM Box -->
  <g class="node-llm" transform="translate(540, 100)">
    <rect class="box-llm" width="160" height="100" />
    <text x="80" y="45" fill="#f8fafc" font-size="18" text-anchor="middle" font-weight="bold">LLM</text>
    <text x="80" y="70" fill="#a855f7" font-size="12" text-anchor="middle">Brain / Reasoning</text>
  </g>

  <!-- Developer Code (Tool definition) -->
  <g transform="translate(80, 240)">
    <g class="anim-tool-node">
      <rect class="box-tool" width="120" height="50" />
      <text x="60" y="30" fill="#f472b6" font-size="14" text-anchor="middle" font-weight="bold">func MyTool()</text>
    </g>
  </g>
  <text x="140" y="310" fill="#64748b" font-size="12" text-anchor="middle">1. Provide Tool to Context</text>

  <!-- Static Original Tool spot (Ghost) -->
  <g transform="translate(80, 240)" opacity="0.3">
    <rect class="box-tool" width="120" height="50" stroke-dasharray="4"/>
    <text x="60" y="30" fill="#f472b6" font-size="14" text-anchor="middle" font-weight="bold">func MyTool()</text>
  </g>

  <!-- Data Packets for animation -->
  <g transform="translate(210, 110)">
    <g class="anim-packet-context">
      <!-- Context part -->
      <rect x="0" y="0" width="35" height="20" fill="#3b82f6" rx="4" />
      <text x="17.5" y="14" fill="#f8fafc" font-size="10" text-anchor="middle" font-weight="bold">Ctx</text>
      
      <!-- Tool part -->
      <rect x="40" y="0" width="45" height="20" fill="#f472b6" rx="4" />
      <text x="62.5" y="14" fill="#0f172a" font-size="10" text-anchor="middle" font-weight="bold">func()</text>
    </g>
  </g>

  <g transform="translate(530, 150)">
    <g class="anim-packet-call">
      <rect class="packet" fill="#f472b6" width="30" height="20" />
      <text x="15" y="14" fill="#0f172a" font-size="10" text-anchor="middle" font-weight="bold">Call</text>
    </g>
  </g>

  <g transform="translate(210, 240)">
    <g class="anim-packet-result">
      <rect class="packet" fill="#4ade80" width="40" height="20" />
      <text x="20" y="14" fill="#0f172a" font-size="10" text-anchor="middle" font-weight="bold">Result</text>
    </g>
  </g>

  <!-- Instruction Texts -->
  <text x="400" y="350" fill="#e2e8f0" font-size="16" text-anchor="middle" font-weight="bold">The Agent Tool Lifecycle</text>
  <text x="400" y="375" fill="#94a3b8" font-size="14" text-anchor="middle">1. Inject Tool ➔ 2. LLM reasons ➔ 3. LLM calls Tool ➔ 4. Return Result to LLM</text>

</svg>
