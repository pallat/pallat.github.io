<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="100%">
  <defs>
    <style>
      text { font-family: monospace; }
      .box-runner { fill: #1e293b; stroke: #3b82f6; stroke-width: 2; rx: 8; }
      .box-agent { fill: #1e293b; stroke: #8b5cf6; stroke-width: 2; rx: 8; }
      .packet { rx: 4; }
      
      @keyframes dashFlow { to { stroke-dashoffset: -16; } }

      /* 4s packet cycle */
      @keyframes packetYield {
        0%, 5% { transform: translate(520px, 160px); opacity: 0; }
        10% { transform: translate(520px, 160px); opacity: 1; }
        45% { transform: translate(280px, 160px); opacity: 1; }
        50%, 100% { transform: translate(280px, 160px); opacity: 0; }
      }
      @keyframes packetResume {
        0%, 55% { transform: translate(280px, 220px); opacity: 0; }
        60% { transform: translate(280px, 220px); opacity: 1; }
        95% { transform: translate(520px, 220px); opacity: 1; }
        100% { transform: translate(520px, 220px); opacity: 0; }
      }

      /* 12s overall text cycle */
      @keyframes showText1 { 0%, 33.2% { opacity: 1; } 33.3%, 100% { opacity: 0; } }
      @keyframes showText2 { 0%, 33.2% { opacity: 0; } 33.3%, 66.5% { opacity: 1; } 66.6%, 100% { opacity: 0; } }
      @keyframes showText3 { 0%, 66.5% { opacity: 0; } 66.6%, 100% { opacity: 1; } }

      /* 12s list apperance cycle */
      @keyframes list1 { 0%, 14% { opacity: 0; } 15%, 100% { opacity: 1; } }
      @keyframes list2 { 0%, 47% { opacity: 0; } 48%, 100% { opacity: 1; } }
      @keyframes list3 { 0%, 81% { opacity: 0; } 82%, 100% { opacity: 1; } }

      /* 12s yield highlighting cycle */
      @keyframes hl1 { 0%, 33.2% { fill: #c084fc; font-weight: bold; } 33.3%, 100% { fill: #475569; font-weight: normal; } }
      @keyframes hl2 { 0%, 33.2% { fill: #475569; font-weight: normal; } 33.3%, 66.5% { fill: #c084fc; font-weight: bold; } 66.6%, 100% { fill: #475569; font-weight: normal; } }
      @keyframes hl3 { 0%, 66.5% { fill: #475569; font-weight: normal; } 66.6%, 100% { fill: #c084fc; font-weight: bold; } }

      /* 4s blinking */
      @keyframes activeRunner {
        0%, 10% { filter: brightness(1); }
        35%, 65% { filter: brightness(1.5); }
        90%, 100% { filter: brightness(1); }
      }
      @keyframes activeAgent {
        0%, 10% { filter: brightness(1.5); }
        35%, 65% { filter: brightness(1); }
        90%, 100% { filter: brightness(1.5); }
      }

      .anim-packet-yield { animation: packetYield 4s ease-in-out infinite; }
      .anim-packet-resume { animation: packetResume 4s ease-in-out infinite; }
      
      .text-event-1 { animation: showText1 12s infinite; }
      .text-event-2 { animation: showText2 12s infinite; }
      .text-event-3 { animation: showText3 12s infinite; }

      .list-event-1 { animation: list1 12s infinite; }
      .list-event-2 { animation: list2 12s infinite; }
      .list-event-3 { animation: list3 12s infinite; }

      .yield-hl-1 { animation: hl1 12s infinite; }
      .yield-hl-2 { animation: hl2 12s infinite; }
      .yield-hl-3 { animation: hl3 12s infinite; }
      
      .arrow-line-left { stroke: #8b5cf6; stroke-width: 2; stroke-dasharray: 8 8; animation: dashFlow 1s linear infinite; }
      .arrow-line-right { stroke: #3b82f6; stroke-width: 2; stroke-dasharray: 8 8; animation: dashFlow 1s linear infinite reverse; }
      
      .node-runner { animation: activeRunner 4s infinite; }
      .node-agent { animation: activeAgent 4s infinite; }
    </style>
    <marker id="arrowhead-left" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6" />
    </marker>
    <marker id="arrowhead-right" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a" />

  <!-- Title & Top flow -->
  <line x1="240" y1="50" x2="540" y2="50" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead-right)"/>
  <text x="400" y="40" fill="#3b82f6" font-size="12" text-anchor="middle">1. เรียก Run(ic) ครั้งเดียว</text>

  <!-- Nodes -->
  <g class="node-runner" transform="translate(40, 100)">
    <rect class="box-runner" width="200" height="120" />
    <text x="100" y="40" fill="#f8fafc" font-size="18" text-anchor="middle" font-weight="bold">Runner</text>
    <text x="100" y="70" fill="#94a3b8" font-size="12" text-anchor="middle">for evt := range Run(ic)</text>
    <text x="100" y="90" fill="#3b82f6" font-size="11" text-anchor="middle">(Active when yielded to)</text>
  </g>

  <g class="node-agent" transform="translate(560, 100)">
    <rect class="box-agent" width="200" height="120" />
    <text x="100" y="40" fill="#f8fafc" font-size="18" text-anchor="middle" font-weight="bold">runGreeting()</text>
    <text x="100" y="70" fill="#94a3b8" font-size="12" text-anchor="middle">Run() ทำงานข้างใน</text>
    <text x="100" y="90" fill="#8b5cf6" font-size="11" text-anchor="middle">(Paused while Runner works)</text>
  </g>

  <!-- Dashed Code Blocks -->
  <!-- Runner Code Block -->
  <g transform="translate(40, 240)">
    <rect width="200" height="100" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="100" y="25" fill="#3b82f6" font-size="13" text-anchor="middle" font-weight="bold">Runner รับทีละ event</text>
    <text class="list-event-1" x="20" y="45" fill="#f8fafc" font-size="11">Event: เริ่มทำงาน...</text>
    <text class="list-event-2" x="20" y="65" fill="#f8fafc" font-size="11">Event: กำลังประมวลผล...</text>
    <text class="list-event-3" x="20" y="85" fill="#f8fafc" font-size="11">Event: เสร็จแล้ว</text>
  </g>

  <!-- Agent Code Block -->
  <g transform="translate(560, 240)">
    <rect width="200" height="100" rx="10" fill="#0f172a" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="100" y="25" fill="#8b5cf6" font-size="13" text-anchor="middle" font-weight="bold">for _, text := range steps</text>
    <text class="yield-hl-1" x="20" y="45" font-size="11">yield("เริ่มทำงาน...", nil)</text>
    <text class="yield-hl-2" x="20" y="65" font-size="11">yield("กำลังประมวลผล...", nil)</text>
    <text class="yield-hl-3" x="20" y="85" font-size="11">yield("เสร็จแล้ว", nil)</text>
  </g>

  <!-- Arrow out of Runner -->
  <line x1="140" y1="340" x2="140" y2="375" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead-right)" />
  <text x="140" y="390" fill="#94a3b8" font-size="12" text-anchor="middle">forward ต่อไปยัง UI / observability</text>

  <!-- Animated Paths -->
  <path class="arrow-line-left" d="M 540 160 L 260 160" marker-end="url(#arrowhead-left)" />
  <text x="400" y="150" fill="#8b5cf6" font-size="12" text-anchor="middle">2. yield event ทีละตัว</text>
  
  <path class="arrow-line-right" d="M 260 220 L 540 220" marker-end="url(#arrowhead-right)" />
  <text x="400" y="245" fill="#3b82f6" font-size="12" text-anchor="middle">3. return true (Resume Agent)</text>

  <!-- Packets -->
  <g class="anim-packet-yield">
    <rect class="packet" fill="#8b5cf6" width="120" height="20" x="-60" y="-10"/>
    <text class="text-event-1" fill="#0f172a" font-size="10" text-anchor="middle" y="3" font-weight="bold">เริ่มทำงาน...</text>
    <text class="text-event-2" fill="#0f172a" font-size="10" text-anchor="middle" y="3" font-weight="bold">กำลังประมวลผล...</text>
    <text class="text-event-3" fill="#0f172a" font-size="10" text-anchor="middle" y="3" font-weight="bold">เสร็จแล้ว</text>
  </g>
  
  <g class="anim-packet-resume">
    <rect class="packet" fill="#3b82f6" width="60" height="20" x="-30" y="-10"/>
    <text fill="#0f172a" font-size="10" text-anchor="middle" y="3" font-weight="bold">true</text>
  </g>
</svg>
